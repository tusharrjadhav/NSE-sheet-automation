name: Update NSE Scanner Sheet

on:
  schedule:
    # 14:45 UTC = 20:15 IST, Mon–Fri (after NSE close & Bhavcopy publish).
    # Note: GitHub cron is UTC and may run several minutes late — that's fine.
    - cron: "45 14 * * 1-5"
  workflow_dispatch: {}   # lets you run it manually from the Actions tab

jobs:
  update-sheet:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run updater
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        run: python update_sheet.py
